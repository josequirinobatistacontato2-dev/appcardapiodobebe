<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardápio do bebê saudável</title>
    <link rel="manifest" href="/manifest.json">
    <link id="favicon" rel="icon" type="image/png" href="https://images.unsplash.com/photo-1596464716127-f2a82984de30?q=80&w=32&h=32&auto=format&fit=crop" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
      * {
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #fdfbf7;
        margin: 0;
        padding: 0;
        color: #1c1917;
      }
      .font-serif {
        font-family: 'Cormorant Garamond', serif;
      }
      .font-sans {
        font-family: 'Quicksand', sans-serif;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d1d5db;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      /* Efeito de vidro para modais */
      .glass-modal {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
